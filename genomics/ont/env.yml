name: ont_variant_calling
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # Core tools
  - python=3.10
  - pip
  - samtools=1.17
  - bcftools=1.17
  - htslib=1.17
  - bedtools=2.31.0

  # ONT alignment + QC
  - minimap2=2.26
  - winnowmap=2.1
  - mosdepth=0.3.3
  - pycoqc=2.5.2

  # Variant calling
  - clair3=1.1.2
  - sniffles=2.2.0
  - cutesv=2.0.1

  # DeepVariant wrapper
  - deepvariant=1.5.0
  - glnexus=1.4.1

  # Annotation
  - ensembl-vep=113
  - biopython=1.83

  # Jupyter support
  - ipykernel
  - notebook
  - jupyterlab

  # Visualization
  - plotly
  - pandas
  - matplotlib
  - seaborn

  - pip:
      - slivar  # Use: git clone & install manually if needed
